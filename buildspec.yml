version: 0.2

env:
  variables:
    NODE_OPTIONS: "--openssl-legacy-provider"

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo Installing app dependencies...
      - cd frontend && npm install
  build:
    commands:
      - echo Building production build...
      - npm run build
  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  base-directory: 'frontend/build'

cache:
  paths:
    - 'frontend/node_modules/**/*'
